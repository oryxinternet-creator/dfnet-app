<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFCC00" />
    <title>DFNET Telecomunicações</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #fdeeb5; }
      * { -webkit-tap-highlight-color: transparent; }
      #dfnet-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #fdeeb5;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
        transition: opacity .45s ease;
        font-family: system-ui, 'Segoe UI', sans-serif;
      }
      #dfnet-splash .slogan { color: #16161d; font-size: 16px; font-weight: 600; letter-spacing: .2px; }
    </style>
  </head>
  <body>
    <div id="dfnet-splash">
      <svg width="220" viewBox="0 0 210 118" xmlns="http://www.w3.org/2000/svg" aria-label="DFNET Telecomunicações">
        <ellipse cx="105" cy="26" rx="34" ry="9" fill="none" stroke="#1b1918" stroke-width="6"/>
        <circle cx="105" cy="17" r="9" fill="#1b1918"/>
        <path d="M99 32 L92 54 L118 54 L111 32 Z" fill="none" stroke="#1b1918" stroke-width="4" stroke-linejoin="round"/>
        <path d="M99 32 L107 44 M111 32 L103 44 M95 44 L107 60 M115 44 L103 60" stroke="#1b1918" stroke-width="3"/>
        <path d="M88 54 L122 54 L116 62 L94 62 Z" fill="#1b1918"/>
        <text x="105" y="100" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-style="italic" font-weight="900" font-size="50" fill="#FFCC00" stroke="#1b1918" stroke-width="6.5" paint-order="stroke" stroke-linejoin="round">Dfnet</text>
        <text x="105" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="10.5" letter-spacing="1.4" fill="#1b1918">TELECOMUNICAÇÕES</text>
      </svg>
      <div class="slogan">Seja fibra, navegue sem limites!</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
